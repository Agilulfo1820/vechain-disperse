<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#f5f3ef"/>
  <!-- stem -->
  <line x1="14" y1="28" x2="14" y2="14" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- dandelion head -->
  <circle cx="14" cy="13" r="1.2" fill="#1a1a1a"/>
  <!-- seed stalks radiating -->
  <line x1="14" y1="13" x2="14" y2="5" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="8" y2="7" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="20" y2="7" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="6" y2="12" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="22" y2="11" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="10" y2="17" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14" y1="13" x2="18" y2="17" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
  <!-- seed tips (small circles) -->
  <circle cx="14" cy="5" r="0.8" fill="#1a1a1a"/>
  <circle cx="8" cy="7" r="0.8" fill="#1a1a1a"/>
  <circle cx="20" cy="7" r="0.8" fill="#1a1a1a"/>
  <circle cx="6" cy="12" r="0.8" fill="#1a1a1a"/>
  <circle cx="22" cy="11" r="0.8" fill="#1a1a1a"/>
  <!-- floating seeds (dispersing) -->
  <g fill="#7dd3c7" stroke="#7dd3c7" stroke-width="0.4">
    <circle cx="25" cy="5" r="0.7"/>
    <line x1="25" y1="5" x2="23" y2="7" stroke-linecap="round"/>
    <circle cx="28" cy="9" r="0.6"/>
    <line x1="28" y1="9" x2="26.5" y2="11" stroke-linecap="round"/>
    <circle cx="26" cy="15" r="0.5"/>
    <line x1="26" y1="15" x2="24.5" y2="16.5" stroke-linecap="round"/>
  </g>
</svg>

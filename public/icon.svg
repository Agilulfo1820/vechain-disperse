<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#f5f3ef"/>

  <!-- stem -->
  <line x1="220" y1="440" x2="220" y2="220" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>

  <!-- dandelion center -->
  <circle cx="220" cy="210" r="14" fill="#1a1a1a"/>

  <!-- seed stalks radiating from center -->
  <line x1="220" y1="210" x2="220" y2="80" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="130" y2="110" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="310" y2="110" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="90" y2="180" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="350" y2="170" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="150" y2="270" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="300" y2="270" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="100" y2="240" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="160" y2="140" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="210" x2="280" y2="140" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

  <!-- seed tips -->
  <circle cx="220" cy="80" r="8" fill="#1a1a1a"/>
  <circle cx="130" cy="110" r="8" fill="#1a1a1a"/>
  <circle cx="310" cy="110" r="8" fill="#1a1a1a"/>
  <circle cx="90" cy="180" r="8" fill="#1a1a1a"/>
  <circle cx="350" cy="170" r="8" fill="#1a1a1a"/>
  <circle cx="150" cy="270" r="7" fill="#1a1a1a"/>
  <circle cx="300" cy="270" r="7" fill="#1a1a1a"/>
  <circle cx="100" cy="240" r="7" fill="#1a1a1a"/>
  <circle cx="160" cy="140" r="7" fill="#1a1a1a"/>
  <circle cx="280" cy="140" r="7" fill="#1a1a1a"/>

  <!-- floating seeds (dispersing to the right, in mint) -->
  <g fill="#7dd3c7" stroke="#7dd3c7" stroke-width="3" stroke-linecap="round">
    <circle cx="390" cy="80" r="6"/>
    <line x1="390" y1="80" x2="375" y2="100"/>

    <circle cx="430" cy="140" r="5.5"/>
    <line x1="430" y1="140" x2="416" y2="158"/>

    <circle cx="410" cy="230" r="5"/>
    <line x1="410" y1="230" x2="397" y2="246"/>

    <circle cx="445" cy="300" r="4.5"/>
    <line x1="445" y1="300" x2="433" y2="314"/>

    <circle cx="380" cy="340" r="4"/>
    <line x1="380" y1="340" x2="370" y2="352"/>
  </g>
</svg>

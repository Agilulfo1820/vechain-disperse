<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f5f3ef"/>

  <!-- dandelion stem -->
  <line x1="340" y1="530" x2="340" y2="310" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>

  <!-- dandelion center -->
  <circle cx="340" cy="300" r="10" fill="#1a1a1a"/>

  <!-- seed stalks -->
  <line x1="340" y1="300" x2="340" y2="190" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="270" y2="220" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="410" y2="220" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="250" y2="275" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="430" y2="270" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="290" y2="350" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="395" y2="345" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="300" y2="240" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="300" x2="380" y2="240" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- seed tips -->
  <circle cx="340" cy="190" r="5" fill="#1a1a1a"/>
  <circle cx="270" cy="220" r="5" fill="#1a1a1a"/>
  <circle cx="410" cy="220" r="5" fill="#1a1a1a"/>
  <circle cx="250" cy="275" r="5" fill="#1a1a1a"/>
  <circle cx="430" cy="270" r="5" fill="#1a1a1a"/>
  <circle cx="290" cy="350" r="4.5" fill="#1a1a1a"/>
  <circle cx="395" cy="345" r="4.5" fill="#1a1a1a"/>
  <circle cx="300" cy="240" r="4.5" fill="#1a1a1a"/>
  <circle cx="380" cy="240" r="4.5" fill="#1a1a1a"/>

  <!-- floating seeds dispersing -->
  <g fill="#7dd3c7" stroke="#7dd3c7" stroke-width="2" stroke-linecap="round">
    <circle cx="500" cy="160" r="4.5"/>
    <line x1="500" y1="160" x2="490" y2="175"/>

    <circle cx="540" cy="240" r="4"/>
    <line x1="540" y1="240" x2="530" y2="253"/>

    <circle cx="510" cy="340" r="3.5"/>
    <line x1="510" y1="340" x2="502" y2="351"/>

    <circle cx="480" cy="120" r="3"/>
    <line x1="480" y1="120" x2="473" y2="130"/>
  </g>

  <!-- text -->
  <text x="620" y="290" font-family="serif" font-size="80" font-weight="400" fill="#1a1a1a">disperse</text>
  <text x="620" y="350" font-family="serif" font-size="26" font-style="italic" fill="#666">distribute vet or tokens to multiple addresses</text>
  <text x="620" y="400" font-family="monospace" font-size="18" fill="#999">powered by vechain multi-clause transactions</text>
</svg>
